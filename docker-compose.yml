services:
  api:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "8232:8000"
    volumes:
      - db_data:/data
    environment:
      DB_PATH: /data/wod2beats.db

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8232}
        VITE_APP_USER: ${VITE_APP_USER}
        VITE_APP_PASSWORD: ${VITE_APP_PASSWORD}
    restart: unless-stopped
    ports:
      - "8231:80"

volumes:
  db_data:
